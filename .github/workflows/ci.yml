name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests rich

      - name: Syntax check all scripts
        run: |
          python -m py_compile scripts/engage.py
          python -m py_compile scripts/daily_post.py
          python -m py_compile scripts/post_custom.py
          python -m py_compile scripts/sync.py
          python -m py_compile scripts/catchup.py
          python -m py_compile scripts/config.py
          echo "All scripts: syntax OK"

      - name: Check for hardcoded secrets
        run: |
          # Block any moltbook_sk_ prefix outside of .env.example or docs.
          BAD=$(grep -rE 'moltbook_sk_[A-Za-z0-9_-]{4,}' . --exclude-dir=.git 2>/dev/null \
                | grep -v '\.env\.example' \
                | grep -vE 'moltbook_sk_(your_?key_?here|YOUR_KEY|yourkeyhere)' || true)
          if [ -n "$BAD" ]; then
            echo "ERROR: hardcoded API key shape found:"
            echo "$BAD"
            exit 1
          fi
          # Also block stray Reddit OAuth tokens (eyJ…) and Anthropic sk-ant- keys.
          if grep -rE '(eyJhbGciOi[A-Za-z0-9_-]{20,}|sk-ant-[A-Za-z0-9_-]{20,})' . --exclude-dir=.git 2>/dev/null; then
            echo "ERROR: looks like a Reddit OAuth or Anthropic key was committed"
            exit 1
          fi
          echo "No hardcoded secrets found"

      - name: Reddit promo ban-safety tests
        run: python tests/test_promo_safety.py
